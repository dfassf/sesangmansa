description = "매일 아침 AI 뉴스 브리핑 텔레그램 봇"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.128.8",
    "google-genai>=1.47.0",
    "pydantic-settings>=2.11.0",
