    "python-telegram-bot>=21.0",
    "feedparser>=6.0.11",
    "uvicorn>=0.39.0",
    "httpx>=0.27.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.24.0",
]
